name: Preview Deployment

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Preview
    permissions:
      pull-requests: write
      issues: write

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
      GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      GOOGLE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.GOOGLE_PRIVATE_KEY_PASSPHRASE }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      VITE_PAGESPEED_API_KEY: ${{ vars.VITE_PAGESPEED_API_KEY }}
      VITE_PRIVY_APP_ID: ${{ vars.VITE_PRIVY_APP_ID }}
      VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
      VITE_WEBHOOK_URL: ${{ vars.VITE_WEBHOOK_URL }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node & PNPM
        uses: ./.github/actions/setup-node-pnpm

      - name: 🚀 Create Neon Database Branch (PR only)
        id: create-neon-branch
        continue-on-error: true
        if: github.event_name == 'pull_request' && env.NEON_API_KEY != ''
        continue-on-error: true
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          api_key: ${{ env.NEON_API_KEY }}

      - name: 🗄️ Sync Database Schema (Prisma DB Push)
        run: pnpm prisma migrate deploy || pnpm prisma db push --accept-data-loss || echo "Fallback Prisma push failed."
        env:
          DATABASE_URL: ${{ steps.create-neon-branch.outputs.db_url || secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ steps.create-neon-branch.outputs.db_url || secrets.DATABASE_URL }}

      - name: 🚀 Install Vercel CLI
        run: npm install --global vercel@latest

      - name: 🔗 Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build Project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          DATABASE_URL: ${{ steps.create-neon-branch.outputs.db_url || secrets.DATABASE_URL }}

      - name: 🚢 Deploy to Vercel (Preview)
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} \
          --env DATABASE_URL="$DATABASE_URL" \
          --env DIRECT_DATABASE_URL="$DATABASE_URL" \
          --env GOOGLE_CLIENT_EMAIL="$GOOGLE_CLIENT_EMAIL" \
          --env GOOGLE_PRIVATE_KEY="$GOOGLE_PRIVATE_KEY" \
          --env GOOGLE_PRIVATE_KEY_PASSPHRASE="$GOOGLE_PRIVATE_KEY_PASSPHRASE" \
          --env OPENAI_API_KEY="$OPENAI_API_KEY" \
          --env PRIVY_APP_SECRET="$PRIVY_APP_SECRET" \
          --env GEMINI_API_KEY="$GEMINI_API_KEY" \
          --env NEON_API_KEY="$NEON_API_KEY" \
          --env VITE_API_URL="$VITE_API_URL" \
          --env VITE_PAGESPEED_API_KEY="$VITE_PAGESPEED_API_KEY" \
          --env VITE_PRIVY_APP_ID="$VITE_PRIVY_APP_ID" \
          --env VITE_SITE_URL="$VITE_SITE_URL" \
          --env VITE_WEBHOOK_URL="$VITE_WEBHOOK_URL")
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          DATABASE_URL: ${{ steps.create-neon-branch.outputs.db_url || secrets.DATABASE_URL }}

      - name: 💬 Comment PR with Preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview Deployment Ready!\n\n✅ Preview: ${{ steps.deploy.outputs.url }}`
            })
